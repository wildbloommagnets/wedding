<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-auto max-w-md border border-gray-100">
        <h1 id="event-name" class="text-2xl font-bold text-gray-800 mb-2 text-center">Event Upload</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">Capture or select photos to print</p>

        <div class="space-y-4">
            <input type="text" id="session-id" placeholder="Your Name or Table #" 
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            
            <label class="block w-full bg-blue-600 text-white text-center py-4 rounded-xl font-semibold cursor-pointer hover:bg-blue-700 transition">
                <span>📸 Select / Take Photos</span>
                <input type="file" id="photo-input" accept="image/*" multiple class="hidden">
            </label>

            <div id="status" class="text-center text-sm font-medium hidden"></div>
        </div>
    </div>

    <script>
        // 1. Get Event Name from URL (e.g. ?event=SmithWedding)
        const urlParams = new URLSearchParams(window.location.search);
        const eventName = urlParams.get('event') || 'General Event';
        document.getElementById('event-name').innerText = eventName;

        const photoInput = document.getElementById('photo-input');
        const status = document.getElementById('status');

        photoInput.addEventListener('change', async (e) => {
            const sessionId = document.getElementById('session-id').value || 'Anonymous';
            const files = e.target.files;
            if (files.length === 0) return;

            status.classList.remove('hidden', 'text-red-500', 'text-green-500');
            status.innerText = `Uploading ${files.length} file(s)...`;

            for (let file of files) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result;
                    
                    try {
                        const response = await fetch('https://script.google.com/macros/s/AKfycbzCHpepp4qECiz15EWwnnnauPO4wHgyLP9EEuIIsomMEhtcLrRdp8UMrsfer6HCF3DQ/exec', {
                            method: 'POST',
                            mode: 'no-cors', // Important for Google Apps Script
                            body: JSON.stringify({
                                eventName: eventName,
                                sessionId: sessionId,
                                fileName: file.name,
                                base64: base64
                            })
                        });
                        status.innerText = "✅ Upload successful!";
                        status.classList.add('text-green-500');
                    } catch (err) {
                        status.innerText = "❌ Upload failed.";
                        status.classList.add('text-red-500');
                    }
                };
            }
        });
    </script>
</body>
</html>
