<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .theme-transition { transition: all 0.4s ease; }
        #status { transition: all 0.3s ease; }
    </style>
</head>
<body id="body-bg" class="bg-gray-50 theme-transition flex items-center justify-center min-h-screen p-4">
    
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 text-center">
        <!-- Logo (Hidden until loaded from Google Sheet) -->
        <img id="event-logo" src="" alt="Logo" class="mx-auto mb-4 h-24 object-contain hidden">
        
        <h1 id="event-display-name" class="text-2xl font-bold text-gray-800 mb-1 leading-tight">Loading...</h1>
        <p id="event-tagline" class="text-sm text-gray-500 mb-6">Connecting to event...</p>

        <div class="space-y-4 text-left">
            <!-- User Identification -->
            <div>
                <label class="text-xs font-semibold text-gray-400 uppercase ml-1">Session ID / Name</label>
                <input type="text" id="session-id" placeholder="Ex: Table 4 or Smith Family" 
                    class="w-full p-3 mt-1 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none border-gray-200">
            </div>
            
            <!-- Upload Button -->
            <label id="upload-btn" class="block w-full bg-gray-400 text-white text-center py-5 rounded-xl font-bold cursor-pointer transition shadow-lg active:scale-95">
                <span>📸 TAKE OR SELECT PHOTOS</span>
                <input type="file" id="photo-input" accept="image/*" multiple class="hidden">
            </label>

            <!-- Status Indicator -->
            <div id="status" class="text-center text-sm font-medium hidden p-3 rounded-lg"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCHpepp4qECiz15EWwnnnauPO4wHgyLP9EEuIIsomMEhtcLrRdp8UMrsfer6HCF3DQ/exec';
        
        // 1. Get Event Key from URL (?event=SmithWedding)
        const urlParams = new URLSearchParams(window.location.search);
        const eventKey = urlParams.get('event') || 'Default';

        const status = document.getElementById('status');
        const uploadBtn = document.getElementById('upload-btn');

        // 2. Fetch Theme from Google Sheet (via the Script's doGet function)
        async function loadTheme() {
            try {
                const response = await fetch(`${SCRIPT_URL}?event=${eventKey}`);
                const theme = await response.json();
                
                document.getElementById('event-display-name').innerText = theme.name;
                document.getElementById('event-tagline').innerText = theme.tagline;
                uploadBtn.style.backgroundColor = theme.color;
                
                if(theme.logo) {
                    const logoImg = document.getElementById('event-logo');
                    logoImg.src = theme.logo;
                    logoImg.classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('event-display-name').innerText = "Upload Photos";
                document.getElementById('event-tagline').innerText = "Ready to print on-site";
                uploadBtn.style.backgroundColor = "#2563eb"; // Fallback blue
            }
        }

        // 3. Handle File Selection and Upload
        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const sessionId = document.getElementById('session-id').value || 'Guest';
            const files = e.target.files;
            if (files.length === 0) return;

            // Show Loading UI
            status.className = "text-center text-sm font-medium p-3 rounded-lg bg-blue-50 text-blue-700 block";
            status.innerText = `Preparing ${files.length} photo(s)...`;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    status.innerText = `Uploading photo ${i + 1} of ${files.length}...`;
                    
                    try {
                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                eventName: eventKey,
                                sessionId: sessionId,
                                fileName: file.name,
                                base64: reader.result
                            }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        });

                        if (i === files.length - 1) {
                            status.innerText = "✅ ALL PHOTOS RECEIVED! Check the printer.";
                            status.className = "text-center text-sm font-medium p-3 rounded-lg bg-green-100 text-green-800 block";
                        }
                    } catch (err) {
                        status.innerText = "❌ Upload Error. Please try again.";
                        status.className = "text-center text-sm font-medium p-3 rounded-lg bg-red-100 text-red-800 block";
                    }
                };
            }
        });

        // Initialize Theme on Load
        loadTheme();
    </script>
</body>
</html>
