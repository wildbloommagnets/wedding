Perfect — that's really helpful context. Let me think through the strategy before designing.

The core tension you've identified: you can't start making a magnet without payment, but you also can't cram payment + upload + steps onto a 4×6 card. So the card has one job — create enough desire and curiosity that guests walk over and ask "how do I get one?"

Here's the approach I'd recommend:

Emotionally, the card should do 3 things only:

Show the product — a beautiful magnet photo does more than any description
Name the feeling — not what it is, but what it means (a memory you can hold)
Give one low-friction next step — a single QR code that opens your upload page
The QR becomes the bridge. Guests scan, upload their photo, then come to you to pay and pick up — that's your natural payment moment. They've already invested (uploaded a photo) so they're far more likely to complete the purchase. That's the commitment psychology working for you.

What stays OFF the card: price, steps, instructions, payment info — all of that kills the emotional pull and belongs in the conversation or on the phone screen.

The card now uses position: relative so the #loading-overlay can sit absolutely on top of it, inheriting the card's background color — so the spinner always looks natural against whatever theme color loads. The form content sits underneath with opacity: 0 and pointer-events: none, making it completely untouchable until showForm() fires.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #loading-overlay {
            position: absolute;
            inset: 0;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: inherit;
            z-index: 10;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: rgba(0,0,0,0.4);
            animation: spin 0.8s linear infinite;
        }
        .loading-msg {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.5;
            letter-spacing: 0.02em;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #form-content {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #form-content.ready {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body id="body-bg" class="flex items-center justify-center min-h-screen p-4 transition-colors duration-500">
    <div id="event-card" class="relative p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100">
 
        <!-- Loading overlay: visible until theme resolves -->
        <div id="loading-overlay">
            <div class="loading-spinner"></div>
            <p class="loading-msg">Connecting to event&hellip;</p>
        </div>
 
        <!-- Form content: fades in after theme loads -->
        <div id="form-content">
            <img id="event-logo" src="" alt="Logo" class="mx-auto mb-4 w-48 h-48 object-contain hidden">
            <h1 id="event-name" class="text-2xl font-bold mb-1"></h1>
            <p id="event-tagline" class="text-sm mb-6 italic opacity-70"></p>
            <div class="space-y-4 text-left">
                <input type="text" id="session-id" placeholder="Your Name or Table #"
                    class="w-full p-4 border-2 border-gray-100 rounded-xl focus:outline-none transition-all">
                <label id="upload-btn" class="block w-full text-center py-5 rounded-2xl font-black cursor-pointer shadow-lg active:scale-95 transition-all">
                    <span>📸 TAKE / SELECT PHOTOS</span>
                    <input type="file" id="photo-input" accept="image/*" multiple class="hidden">
                </label>
                <div id="status" class="text-center text-sm font-bold hidden p-3 rounded-xl"></div>
            </div>
        </div>
 
    </div>
 
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJJ_BCmf8eAv10A7ULK53CSF33T4e1h-t7PXXqF9_c1lSNMRcmBTnAsfatYVRGDRGA/exec';
        const urlParams = new URLSearchParams(window.location.search);
        const eventKey = urlParams.get('event') || 'Default';
 
        // Auto-fill name from local storage if previously entered
        var savedName = localStorage.getItem('sessionId_' + eventKey);
        if (savedName) {
            document.getElementById('session-id').value = savedName;
        }
 
        // Save name to local storage whenever user types
        document.getElementById('session-id').addEventListener('input', function() {
            localStorage.setItem('sessionId_' + eventKey, this.value.trim());
        });
 
        function getTextColor(hex) {
            hex = hex.replace('#', '');
            var r = parseInt(hex.substring(0,2), 16);
            var g = parseInt(hex.substring(2,4), 16);
            var b = parseInt(hex.substring(4,6), 16);
            var brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? '#1a1a1a' : '#ffffff';
        }
 
        function getLightTint(hex) {
            hex = hex.replace('#', '');
            var r = parseInt(hex.substring(0,2), 16);
            var g = parseInt(hex.substring(2,4), 16);
            var b = parseInt(hex.substring(4,6), 16);
            r = Math.round(r + (255 - r) * 0.85);
            g = Math.round(g + (255 - g) * 0.85);
            b = Math.round(b + (255 - b) * 0.85);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }
 
        function showForm() {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('form-content').classList.add('ready');
        }
 
        function showLoadError(msg) {
            var overlay = document.getElementById('loading-overlay');
            overlay.innerHTML = '<p style="font-size:0.85rem;font-weight:600;color:#dc2626;text-align:center;padding:0 1rem;line-height:1.5;">' + msg + '</p>';
        }
 
        fetch(SCRIPT_URL + '?event=' + eventKey)
            .then(function(res) { return res.json(); })
            .then(function(theme) {
                var bgColor   = theme.bgColor   || '#F9F973';
                var btnColor  = theme.btnColor  || bgColor;
                var textColor = theme.textColor || getTextColor(bgColor);
 
                document.getElementById('body-bg').style.backgroundColor = bgColor;
                document.getElementById('event-card').style.backgroundColor = getLightTint(bgColor);
                document.getElementById('event-name').style.color = textColor;
                document.getElementById('event-tagline').style.color = textColor;
 
                var btn = document.getElementById('upload-btn');
                btn.style.backgroundColor = btnColor;
                btn.style.color = getTextColor(btnColor);
 
                document.getElementById('event-name').innerText = theme.name;
                document.title = theme.name;
                document.getElementById('event-tagline').innerText = theme.tagline;
 
                if (theme.logo) {
                    var logo = document.getElementById('event-logo');
                    logo.src = theme.logo;
                    logo.classList.remove('hidden');
                }
 
                // All theme applied — reveal the form
                showForm();
            })
            .catch(function(err) {
                console.error(err);
                showLoadError('Could not connect to event.<br>Please check your link and try again.');
            });
 
        document.getElementById('photo-input').addEventListener('change', function(e) {
            var sessionId = document.getElementById('session-id').value.trim();
            var status = document.getElementById('status');
            var files = e.target.files;
            if (!files.length) return;
 
            if (!sessionId) {
                status.className = "text-center text-sm font-bold p-3 rounded-xl bg-red-100 text-red-700 block";
                status.innerText = '⚠️ Please enter your name or table number first.';
                document.getElementById('photo-input').value = '';
                return;
            }
 
            status.className = "text-center text-sm font-bold p-3 rounded-xl bg-blue-100 text-blue-700 block";
            status.innerText = 'Sending ' + files.length + ' photo(s)...';
 
            for (var i = 0; i < files.length; i++) {
                (function(file) {
                    var reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = function() {
                        fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                eventName: eventKey,
                                sessionId: sessionId,
                                fileName: file.name,
                                base64: reader.result
                            })
                        })
                        .then(function() {
                            status.innerText = '✅ PHOTOS SENT! Printing soon...';
                            status.className = "text-center text-sm font-bold p-3 rounded-xl bg-green-100 text-green-700 block";
                        })
                        .catch(function() {
                            status.innerText = '❌ ERROR. Try again.';
                            status.className = "text-center text-sm font-bold p-3 rounded-xl bg-red-100 text-red-700 block";
                        });
                    };
                })(files[i]);
            }
        });
    </script>
</body>
</html>
